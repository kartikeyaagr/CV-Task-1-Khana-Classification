# Phase-1 training recipe: ConvNeXt-Small @ 224px, 25 epochs
# Run: uv run python scripts/train.py --config configs/convnext_small.yaml

data:
  root: "../khana"
  manifest: "../splits/manifest.json"
  num_classes: 80
  image_size: 224
  num_workers: 8
  pin_memory: true
  prefetch_factor: 4
  sampler_power: 0.5

aug:
  scale_min: 0.7
  trivial_augment: true
  random_erase_prob: 0.1
  mixup_alpha: 0.2
  cutmix_alpha: 1.0
  mixup_prob: 0.5

model:
  name: "convnext_small.fb_in22k_ft_in1k"
  drop_path_rate: 0.1
  layer_decay: 0.75

train:
  epochs: 25
  batch_size: 64
  grad_accum_steps: 1
  optimizer: "adamw"
  lr: 0.0005
  weight_decay: 0.05
  clip_grad_norm: 1.0
  warmup_epochs: 5
  min_lr: 0.000001
  label_smoothing: 0.1
  amp_dtype: "bfloat16"
  ema_decay: 0.9998
  checkpoint_dir: "checkpoints"
  save_every: 5
  seed: 42

mlflow:
  experiment_name: "khana-convnext_small"
  tracking_uri: "mlruns"
  log_system_metrics: true
